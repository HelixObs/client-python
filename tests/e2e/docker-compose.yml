name: helixobs-e2e-client

# Minimal stack for client-python e2e tests.
# The gateway image must be pre-built before running:
#
#   docker build -t helixobs-gateway <path-to-gateway-repo>
#
# In CI this is done by the e2e workflow after checking out the gateway repo.

volumes:
  db-data:

networks:
  e2e:

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER:     helix
      POSTGRES_PASSWORD: helix
      POSTGRES_DB:       helixobs
    volumes:
      - db-data:/var/lib/postgresql/data
      # Migration SQL path is relative to the repo root, set via GATEWAY_REPO env var
      # in CI; locally, set GATEWAY_MIGRATIONS_DIR to point at your gateway checkout.
      - ${GATEWAY_MIGRATIONS_DIR:-../../../gateway/migrations}/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ${GATEWAY_MIGRATIONS_DIR:-../../../gateway/migrations}/003_trace_dedup.sql:/docker-entrypoint-initdb.d/003_trace_dedup.sql:ro
      - ${GATEWAY_MIGRATIONS_DIR:-../../../gateway/migrations}/005_entity_events_trace_id.sql:/docker-entrypoint-initdb.d/005_entity_events_trace_id.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d helixobs"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [e2e]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel/config.yml:ro
    networks: [e2e]

  gateway:
    image: helixobs-gateway
    environment:
      GATEWAY_ADDR:       ":4317"
      COLLECTOR_ENDPOINT: "otel-collector:4317"
      DB_URL:             "postgres://helix:helix@db:5432/helixobs"
      METRICS_ADDR:       ":2112"
    ports:
      - "4317:4317"
      - "2112:2112"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2112/metrics > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [e2e]
